{% extends "base.html" %}
{% block title %}First-Time Setup - Write It Great{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-card">
        <h1>First-Time Setup</h1>
        <p style="color: var(--gray-500); font-size: 0.9rem; margin-bottom: 1.5rem;">
            Create the first admin account. This page will disappear once an account exists.
        </p>
        {% if error %}
            <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Andy Smith">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="andy@writeitgreat.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Min. 8 characters">
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" required placeholder="Repeat password">
            </div>
            <button type="submit" class="btn btn-primary login-btn">Create Admin Account</button>
        </form>
    </div>
</div>
{% endblock %}
